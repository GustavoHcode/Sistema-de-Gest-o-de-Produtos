{% extends 'index.html' %}

{% block title %}Editar Produto | GhTech{% endblock %}

{% block content %}
<div class="edit-container">
    <div class="header-action">
        <h1>Editar Produto</h1>
        <a href="/produtos" class="btn-back">← Voltar para a lista</a>
    </div>
    
    <section class="form-section edit-card">
        <form action="{{ url_for('products.editar_produto', id=produto['id']) }}" method="POST">
    <div class="form-group">
        <label for="nome">Nome do Produto</label>
        <input type="text" id="nome" name="nome" value="{{ produto['name'] }}" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="quantidade">Quantidade em Estoque</label>
            <input type="number" id="quantidade" name="quantidade" value="{{ produto['amount'] }}" step="1" required>
        </div>

        <div class="form-group">
            <label for="preco_compra">Preço de Compra (R$)</label>
            <input type="number" id="preco_compra" name="preco_compra" value="{{ produto['buy_price'] }}" step="0.01" required>
        </div>

        <div class="form-group">
            <label for="preco_venda">Preço de Venda (R$)</label>
            <input type="number" id="preco_venda" name="preco_venda" value="{{ produto['sale_price'] }}" step="0.01" required>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-save">Salvar Alterações</button>
        <a href="/produtos" class="btn-cancel">Cancelar</a>
    </div>
    </form>
    </section>
    
</div>
{% endblock %}
